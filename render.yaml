# render.yaml — Render.com deployment configuration
# Deploy as a "Background Worker" (NOT a Web Service)

services:
  - type: worker
    name: telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TOKEN
        sync: false
      - key: GEMINI_KEY_1
        sync: false
      - key: GEMINI_KEY_2
        sync: false
      - key: GEMINI_KEY_3
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: PORT
        value: 10000
    plan: free
